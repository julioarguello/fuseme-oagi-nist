# AOP
spring:
  aop:
    proxy-target-class: true

# (JAF), 20260317, Reconfigured datasource from Oracle (OracleDriver, jdbc:oracle:thin) to MariaDB
# DataSource - MariaDB
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://localhost:3306/oagi?useSSL=false&allowPublicKeyRetrieval=true
    username: oagi
    password: oagi
    platform: mysql

    continue-on-error: true
    initialize: false
    auto-commit: false

  jpa:
    generate-ddl: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        # (JAF), 20260317, Changed dialect from Oracle12cDialect to MySQL5InnoDBDialect
        dialect: org.hibernate.dialect.MySQL5InnoDBDialect
        # (JAF), 20260317, Added: required to quote reserved words like 'release' in MariaDB
        globally_quoted_identifiers: true
        id:
          new_generator_mappings: true
        cache:
          use_second_level_cache: false
        ejb:
          interceptor: org.oagi.srt.persistence.populate.EntityUpdateInterceptor

  batch:
    initializer:
      enabled: false

logging:
  level:
    org.oagi.srt: DEBUG
    org.springframework: INFO
    org.hibernate.SQL: INFO