# srt-openapi application config
# DB connection reuses the same MariaDB instance populated by srt-import.
spring:
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://localhost:3306/oagi?useSSL=false&allowPublicKeyRetrieval=true
    username: oagi
    password: oagi
    auto-commit: false

  jpa:
    generate-ddl: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL5InnoDBDialect
        globally_quoted_identifiers: true
        id:
          new_generator_mappings: true
        cache:
          use_second_level_cache: false

logging:
  level:
    org.oagi.srt: DEBUG
    org.springframework: INFO
    org.hibernate.SQL: INFO
